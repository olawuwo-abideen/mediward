<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Profile | MediWard Portal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    :root { --primary: #2563eb; --soft-bg: #f8fafc; --error: #ef4444; --success: #10b981; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--soft-bg); }
    .container { max-width: 600px; margin-top: 50px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);}
    h2 { margin-bottom: 25px; font-weight: 700; }
    .form-control { border-radius: 12px; padding: 12px; border: 1px solid #e2e8f0; font-size: 14px; }
    .btn-update { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: 600; transition: 0.3s; }
    .btn-update:hover { background: #1e4bb8; }
    .alert-custom { display: none; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 600; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="container">
    <h2>Update Profile</h2>
    <div id="alertMsg" class="alert-custom"></div>
    <form id="updateProfileForm">
        <div class="mb-3">
            <label class="form-label">First Name</label>
            <input type="text" id="firstname" class="form-control" placeholder="John" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" id="lastname" class="form-control" placeholder="Doe" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Date of Birth</label>
            <input type="date" id="dob" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="tel" id="phonenumber" class="form-control" placeholder="08012345678" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select id="gender" class="form-control" required>
                <option value="" disabled selected>Select gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>
        <button type="submit" class="btn-update">Update Profile</button>
    </form>
</div>

<script>
const form = document.getElementById('updateProfileForm');
const alertMsg = document.getElementById('alertMsg');

function showAlert(message, type='success') {
    alertMsg.style.display = 'block';
    alertMsg.innerText = message;
    alertMsg.style.background = type === 'error' ? '#fff5f5' : '#f0fff4';
    alertMsg.style.color = type === 'error' ? '#c53030' : '#22543d';
    alertMsg.style.border = type === 'error' ? '1px solid #feb2b2' : '1px solid #9ae6b4';
}

form.addEventListener('submit', function(e) {
    e.preventDefault();

    // Get values
    const firstname = document.getElementById('firstname').value.trim();
    const lastname = document.getElementById('lastname').value.trim();
    const dob = document.getElementById('dob').value;
    const phonenumber = document.getElementById('phonenumber').value.trim();
    const gender = document.getElementById('gender').value;

    // Simple validation
    if(!firstname || !lastname || !dob || !phonenumber || !gender) {
        return showAlert("All fields are required.", "error");
    }

    // Validate phone (simple example: must be digits)
    const phoneRegex = /^[0-9]{10,15}$/;
    if(!phoneRegex.test(phonenumber)) {
        return showAlert("Phone number must be 10-15 digits.", "error");
    }

    // Validate DOB (user must be at least 18)
    const birthDate = new Date(dob);
    const today = new Date();
    let age = today.getFullYear() - birthDate.getFullYear();
    const m = today.getMonth() - birthDate.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) { age--; }
    if(age < 18) return showAlert("You must be at least 18 years old.", "error");

    // Create payload
    const profileData = { firstname, lastname, dob, phonenumber, gender };

    // Example: store in localStorage (replace with API call)
    localStorage.setItem('profile', JSON.stringify(profileData));
    showAlert("Profile updated successfully!", "success");
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
