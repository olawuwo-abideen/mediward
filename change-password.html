<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0f172a;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:system-ui;
}

.password-card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:40px;
    width:100%;
    max-width:420px;
    color:white;
    box-shadow:0 20px 50px  rgba(37,99,235,0.15);
}

.form-control{
    background:rgba(255,255,255,0.1);
    border:none;
    color:white;
}

.form-control:focus{
    background:rgba(255,255,255,0.15);
    box-shadow:none;
}

.btn-primary{
    width:100%;
    padding:12px;
    font-weight:600;
}

.message{
    font-size:14px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="password-card">

<h3 class="mb-4 text-center">Change Password</h3>

<div id="message" class="message text-center"></div>

<form id="passwordForm">

<div class="mb-3">
<label class="form-label">Old Password</label>
<input type="password" id="oldPassword" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">New Password</label>
<input type="password" id="newPassword" class="form-control" required>
</div>


<button type="submit" class="btn btn-primary">Update Password</button>

</form>

</div>

<script>

const API_BASE = "https://your-backend-url.com/admin/change-password";

document.getElementById("passwordForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const oldPassword = document.getElementById("oldPassword").value;
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const message = document.getElementById("message");

    message.innerHTML = "";

    if(newPassword !== confirmPassword){
        message.style.color="salmon";
        message.innerHTML="New passwords do not match";
        return;
    }

    const token = localStorage.getItem("aura_admin_token");

    try{

        const res = await fetch(API_BASE,{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":`Bearer ${token}`
            },
            body:JSON.stringify({
                oldPassword,
                newPassword
            })
        });

        const data = await res.json();

        if(!res.ok){
            message.style.color="salmon";
            message.innerHTML=data.message || "Password change failed";
            return;
        }

        message.style.color="lightgreen";
        message.innerHTML="Password updated successfully";

        document.getElementById("passwordForm").reset();

    }catch(err){

        message.style.color="salmon";
        message.innerHTML="Network error";

    }

});

</script>

</body>
</html>
