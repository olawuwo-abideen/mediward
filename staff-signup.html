<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | MediWard Clinical Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --soft-bg: #f8fafc; --success: #10b981; }

        body {
            background: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        .navbar{
            background: rgba(230, 233, 255, 0.85);
            backdrop-filter: blur(14px);
        }

        .nav-link i{
            margin-right: 6px;
        }

        .split-screen {
            display: flex;
            min-height: calc(100vh - 76px);
        }

        .left-side {
            flex: 1.2;
            background: linear-gradient(to right,
                        rgba(15, 23, 42, 0.9) 0%,
                        rgba(15, 23, 42, 0.4) 50%,
                        rgba(15, 23, 42, 0.1) 100%),
                        url('https://st.depositphotos.com/1907633/2184/i/450/depositphotos_21841631-stock-photo-success-smart-medical-doctor-with.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            color: white;
            background-blend-mode: multiply;
        }

        .right-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: var(--soft-bg);
        }

        .auth-box {
            width: 100%;
            max-width: 480px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
            transition: 0.3s;
            background: white;
        }

        .btn-auth {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-auth:hover {
            background: #1d4ed8;
        }

        .btn-auth:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }

        .alert-custom {
            display: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .phone-group {
            display: flex;
            align-items: stretch;
        }

        .phone-prefix {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            background: #e2e8f0;
            border: 1px solid #e2e8f0;
            border-right: none;
            border-radius: 12px 0 0 12px;
            font-size: 14px;
            color: #334155;
            min-width: 58px;
            justify-content: center;
        }

        .phone-input {
            border-radius: 0 12px 12px 0;
        }

        @media (max-width: 992px) {
            .left-side { display: none; }
            .split-screen { min-height: auto; }
            .right-side { min-height: calc(100vh - 76px); }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="image/logo mediward.png" alt="Logo" style="height:48px; margin-right:10px;">
      <span class="fw-bold text-primary">MediWard</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto fw-semibold align-items-center">
        <li class="nav-item"><a class="nav-link px-3" href="index.html"><i class="fa-solid fa-microchip"></i>Home</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="./about-us.html"><i class="fa-solid fa-circle-info"></i>About Us</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="./compliance.html"><i class="fa-solid fa-shield-halved"></i>Compliance</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="./contact-us.html"><i class="fa-solid fa-phone"></i>Contact Us</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="./login.html"><i class="fa-solid fa-arrow-right-to-bracket"></i>Login</a></li>
        <li class="nav-item ms-lg-3">
          <div class="dropdown">
            <button class="btn btn-primary rounded-pill px-4 dropdown-toggle" type="button" data-bs-toggle="dropdown">
              <i class="fa-solid fa-right-to-bracket me-2"></i>Signup
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2 p-2 rounded-4">
              <li><a class="dropdown-item rounded-3 py-2" href="patient-signup.html">Patient Signup</a></li>
              <li><a class="dropdown-item rounded-3 py-2" href="staff-signup.html">Staff Signup</a></li>
            </ul>
          </div>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="split-screen">
    <div class="left-side">
        <div class="mb-5">
            <img src="image/logo mediward.png" alt="MediWard" style="height: 50px; filter: brightness(0) invert(1);">
        </div>

        <h1 class="display-4 fw-800 mb-4">Your Health, <br>Our Priority.</h1>
        <p class="lead opacity-75 mb-5">A secure clinical gateway for hospital staff to manage patient observations efficiently.</p>
        <div class="d-flex gap-4 border-top pt-4 border-white border-opacity-25">
            <div><h5 class="mb-0 fw-bold">AES-256</h5><small class="opacity-50">Encryption</small></div>
            <div><h5 class="mb-0 fw-bold">Staff Only</h5><small class="opacity-50">Access</small></div>
        </div>
    </div>

    <div class="right-side">
        <div class="auth-box">
            <div id="authAlert" class="alert-custom"></div>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="signupPane">
                    <form id="signupForm">
                        <div class="row g-2 mb-3">
                            <div class="col-md-6">
                                <label class="small fw-bold mb-1">First Name</label>
                                <input type="text" id="regFirst" class="form-control" placeholder="Jane" required>
                            </div>
                            <div class="col-md-6">
                                <label class="small fw-bold mb-1">Last Name</label>
                                <input type="text" id="regLast" class="form-control" placeholder="Doe" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="small fw-bold mb-1">Date of Birth</label>
                            <input type="date" id="regDOB" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="small fw-bold mb-1">Phone Number</label>
                            <div class="phone-group">
                                <span class="phone-prefix">+44</span>
                                <input
                                    type="tel"
                                    id="regPhone"
                                    class="form-control phone-input"
                                    placeholder="7123456789"
                                    maxlength="10"
                                    inputmode="numeric"
                                    required
                                >
                            </div>
                            <small class="text-muted">Enter 10 digits after +44</small>
                        </div>

                        <div class="mb-3">
                            <label class="small fw-bold mb-1">Gender</label>
                            <select id="gender" class="form-control" required>
                                <option value="" disabled selected>Select your gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="small fw-bold mb-1">Role</label>
                            <select id="role" class="form-control" required>
                                <option value="" disabled selected>Select your role</option>
                                <option value="Doctor">Doctor</option>
                                <option value="Nurse">Nurse</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="small fw-bold mb-1">Email Address</label>
                            <input type="email" id="regEmail" class="form-control" placeholder="janedoe@email.com" required>
                        </div>

                        <div class="mb-3">
                            <label class="small fw-bold mb-1">Create Password (8+ characters)</label>
                            <input type="password" id="regPass" class="form-control" minlength="8" required>
                        </div>

                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="consent" required>
                                <label class="form-check-label small text-muted" for="consent">
                                    I agree with
                                    <a href="terms-and-condition.html"
                                       class="text-decoration-none"
                                       style="color:#2563eb;"
                                       target="_blank"
                                       rel="noopener noreferrer">
                                        MediWard terms and conditions
                                    </a>.
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn-auth" id="signupBtn">Signup</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const authAlert = document.getElementById('authAlert');
    const signupForm = document.getElementById('signupForm');
    const signupBtn = document.getElementById('signupBtn');
    const phoneInput = document.getElementById('regPhone');

    phoneInput.addEventListener('input', function () {
        this.value = this.value.replace(/\D/g, '').slice(0, 10);
    });

    function showAlert(msg, type) {
        authAlert.style.display = 'block';
        authAlert.innerText = msg;
        authAlert.style.background = type === 'error' ? '#fff5f5' : '#f0fff4';
        authAlert.style.color = type === 'error' ? '#c53030' : '#22543d';
        authAlert.style.border = type === 'error' ? '1px solid #feb2b2' : '1px solid #9ae6b4';
    }

    function calculateAge(dateString) {
        const dob = new Date(dateString);
        const today = new Date();
        let age = today.getFullYear() - dob.getFullYear();
        const monthDiff = today.getMonth() - dob.getMonth();

        if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) {
            age--;
        }

        return age;
    }

    signupForm.addEventListener('submit', handleSignup);

    async function handleSignup(e) {
        e.preventDefault();

        authAlert.style.display = 'none';

        const firstname = document.getElementById('regFirst').value.trim();
        const lastname = document.getElementById('regLast').value.trim();
        const dob = document.getElementById('regDOB').value;
        const phoneDigits = document.getElementById('regPhone').value.trim();
        const gender = document.getElementById('gender').value;
        const role = document.getElementById('role').value;
        const email = document.getElementById('regEmail').value.trim().toLowerCase();
        const password = document.getElementById('regPass').value;

        if (calculateAge(dob) < 18) {
            showAlert("Access Denied: You must be 18 or older.", "error");
            return;
        }

        if (!/^\d{10}$/.test(phoneDigits)) {
            showAlert("Enter a valid UK number with 10 digits after +44.", "error");
            return;
        }

        const payload = {
            firstname,
            lastname,
            dob,
            phonenumber: "+44" + phoneDigits,
            gender,
            role,
            email,
            password
        };

        signupBtn.disabled = true;
        signupBtn.textContent = "Signing up...";

        try {
            const response = await fetch("https://mediwardbackend.vercel.app/auth/staff/signup", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (!response.ok) {
                let errorMessage = "Signup failed";

                if (Array.isArray(result.message)) {
                    errorMessage = result.message.join(", ");
                } else if (result.message) {
                    errorMessage = result.message;
                }

                showAlert(errorMessage, "error");
                signupBtn.disabled = false;
                signupBtn.textContent = "Signup";
                return;
            }

            localStorage.setItem("verificationEmail", email);
            showAlert("Signup successful. Redirecting to verification page...", "success");

            setTimeout(() => {
                window.location.href = "verification.html";
            }, 1200);

        } catch (error) {
            console.error(error);
            showAlert("Unable to connect to server. Please try again.", "error");
            signupBtn.disabled = false;
            signupBtn.textContent = "Signup";
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
