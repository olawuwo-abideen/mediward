<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mediward Admin Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

    body {
        background: #0f172a;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .auth-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 35px;
        padding: 50px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        color: white;
        text-align: center;
    }

    .form-control {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 15px;
        color: white;
        font-weight: 600;
        margin-bottom: 20px;
    }

    .form-control:focus {
        background: rgba(255,255,255,0.15);
        border-color: #4f46e5;
        box-shadow: none;
    }

    .btn-login {
        background: #4f46e5;
        border: none;
        width: 100%;
        padding: 15px;
        border-radius: 12px;
        font-weight: 800;
        transition: 0.3s;
        margin-bottom: 15px;
    }

    .btn-login:hover {
        background: #4338ca;
        transform: translateY(-2px);
    }

    .error-msg {
        color: #f87171;
        font-size: 0.9rem;
        margin-bottom: 15px;
    }

    .small-text {
        font-size: 0.8rem;
        opacity: 0.5;
    }
</style>
</head>
<body>

<div class="auth-card">
    <div class="mb-4">
        <i class="fa-solid fa-user-shield fa-3x text-primary"></i>
        <h2 class="fw-800 mt-3">Mediward Admin Login</h2>
        <p class="small-text">Restricted System Access</p>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <input type="text" id="adminEmail" class="form-control" placeholder="admin@example.com">
    <input type="password" id="adminPassword" class="form-control" placeholder="••••••••">
    <button class="btn-login" onclick="loginAdmin()">Sign In</button>

    <div class="small-text mt-3">
        <i class="fa fa-lock me-1"></i> AES-256 Encrypted | Session ID: <span id="sessID">...</span>
    </div>
</div>

<script>
    // Generate fake session ID for display
    document.getElementById('sessID').innerText = Math.random().toString(36).substr(2,9).toUpperCase();

    const API_BASE = "http://localhost:3000/"; 

    async function loginAdmin() {
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value.trim();
        const errorDiv = document.getElementById('error-msg');
        errorDiv.innerText = "";

        if(!email || !password) {
            errorDiv.innerText = "Please enter both email and password.";
            return;
        }

        try {
            const res = await fetch(`${API_BASE}/admin/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if(!res.ok) {
                errorDiv.innerText = data.message || "Login failed. Check credentials.";
                return;
            }

            // Save token in localStorage
            localStorage.setItem('aura_admin_token', data.token);

            // Redirect to admin dashboard
            window.location.href = "admin-dashboard.html";

        } catch(err) {
            console.error(err);
            errorDiv.innerText = "Network error. Please try again.";
        }
    }
</script>

</body>
</html>
