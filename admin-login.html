<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mediward Admin Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

    body {
        background: #0f172a;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .auth-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 35px;
        padding: 50px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        color: white;
        text-align: center;
    }

    .form-control {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 15px;
        color: white;
        font-weight: 600;
        margin-bottom: 20px;
    }

    .form-control:focus {
        background: rgba(255,255,255,0.15);
        border-color: #4f46e5;
        box-shadow: none;
        color: white;
    }

    .form-control::placeholder {
        color: rgba(255,255,255,0.6);
    }

    .btn-login {
        background: #4f46e5;
        border: none;
        width: 100%;
        padding: 15px;
        border-radius: 12px;
        font-weight: 800;
        transition: 0.3s;
        margin-bottom: 15px;
        color: white;
    }

    .btn-login:hover {
        background: #4338ca;
        transform: translateY(-2px);
    }

    .btn-login:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
    }

    .small-text {
        font-size: 0.8rem;
        opacity: 0.5;
    }

    /* RIGHT SIDE TOAST */
    #toast-container {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
    }

    .toast-msg {
        min-width: 260px;
        max-width: 340px;
        padding: 14px 18px;
        border-radius: 12px;
        color: white;
        font-weight: 600;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        animation: slideInRight 0.35s ease, fadeOutRight 0.35s ease 2.65s forwards;
    }

    .toast-success {
        background: #10b981;
    }

    .toast-error {
        background: #ef4444;
    }

    .toast-info {
        background: #3b82f6;
    }

    @keyframes slideInRight {
        from {
            opacity: 0;
            transform: translateX(60px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    @keyframes fadeOutRight {
        to {
            opacity: 0;
            transform: translateX(60px);
        }
    }
</style>
</head>
<body>

<div class="auth-card">
    <div class="mb-4">
        <i class="fa-solid fa-user-shield fa-3x text-primary"></i>
        <h2 class="fw-800 mt-3">Mediward Admin Login</h2>
        <p class="small-text">Restricted System Access</p>
    </div>

    <input type="text" id="adminEmail" class="form-control" placeholder="admin@example.com">
    <input type="password" id="adminPassword" class="form-control" placeholder="••••••••">
    <button id="loginBtn" class="btn-login" onclick="loginAdmin()">Sign In</button>

    <div class="small-text mt-3">
        <i class="fa fa-lock me-1"></i> AES-256 Encrypted | Session ID: <span id="sessID">...</span>
    </div>
</div>

<div id="toast-container"></div>

<script>
    document.getElementById('sessID').innerText = Math.random().toString(36).substr(2, 9).toUpperCase();

    const API_BASE = "https://mediwardbackend.vercel.app";

    function showToast(message, type = "info") {
        const container = document.getElementById("toast-container");

        const toast = document.createElement("div");
        toast.className = `toast-msg toast-${type}`;
        toast.innerText = message;

        container.appendChild(toast);

        setTimeout(() => {
            toast.remove();
        }, 3000);
    }

    async function loginAdmin() {
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value.trim();
        const loginBtn = document.getElementById('loginBtn');

        if (!email || !password) {
            showToast("Please enter both email and password.", "error");
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerText = "Signing In...";

        try {
            const res = await fetch(`${API_BASE}/admin/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (!res.ok) {
                const msg = data.message || "Login failed. Check credentials.";
                showToast(msg, "error");
                loginBtn.disabled = false;
                loginBtn.innerText = "Sign In";
                return;
            }

            localStorage.setItem('aura_admin_token', data.token);
            showToast("Login successful. Redirecting...", "success");

            setTimeout(() => {
                window.location.href = "admin-dashboard.html";
            }, 1000);

        } catch (err) {
            console.error(err);
            showToast("Network error. Please try again.", "error");
            loginBtn.disabled = false;
            loginBtn.innerText = "Sign In";
        }
    }

    document.getElementById("adminPassword").addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
            loginAdmin();
        }
    });

    document.getElementById("adminEmail").addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
            loginAdmin();
        }
    });
</script>

</body>
</html>
