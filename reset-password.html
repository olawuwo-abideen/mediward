<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | MediWard</title>
<style>
body{
  font-family:Arial, sans-serif;
  background:#f2f5f9;
  margin:0;
}

.container{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.card{
  background:white;
  width:100%;
  max-width:420px;
  padding:35px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

h2{
  margin-top:0;
  margin-bottom:10px;
  color:#1b75d0;
  text-align:center;
}

p{
  color:#6b7280;
  text-align:center;
  font-size:14px;
  margin-bottom:25px;
}

.input-group{
  margin-bottom:16px;
}

label{
  display:block;
  margin-bottom:6px;
  font-weight:bold;
  font-size:14px;
}

input{
  width:100%;
  padding:12px;
  border:1px solid #cbd5e1;
  border-radius:8px;
  font-size:14px;
  box-sizing:border-box;
}

input:focus{
  outline:none;
  border-color:#1b75d0;
  box-shadow:0 0 0 2px rgba(27,117,208,0.15);
}

button{
  width:100%;
  background:#1b75d0;
  border:none;
  padding:12px;
  border-radius:8px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  font-size:15px;
}

button:hover{
  background:#155fa8;
}

button:disabled{
  background:#93c5fd;
  cursor:not-allowed;
}

.message{
  margin-top:15px;
  font-size:14px;
  text-align:center;
  min-height:20px;
}

.success{
  color:green;
}

.error{
  color:red;
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>Reset Password</h2>
    <p>Enter your new password below.</p>

    <form id="resetPasswordForm">
      <div class="input-group">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="Enter new password" required>
      </div>

      <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
      </div>

      <button type="submit" id="resetBtn">Reset Password</button>
    </form>

    <div id="message" class="message"></div>
  </div>
</div>

<script>
const API_BASE = "https://mediwardbackend.vercel.app";
const form = document.getElementById("resetPasswordForm");
const resetBtn = document.getElementById("resetBtn");
const messageBox = document.getElementById("message");

function showMessage(text, type) {
  messageBox.className = "message " + type;
  messageBox.innerText = text;
}

function getTokenFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get("token");
}

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const token = getTokenFromUrl();
  const password = document.getElementById("password").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  if (!token) {
    showMessage("Reset token is missing from the link.", "error");
    return;
  }

  if (!password || !confirmPassword) {
    showMessage("Please fill in all fields.", "error");
    return;
  }

  if (password !== confirmPassword) {
    showMessage("Passwords do not match.", "error");
    return;
  }

  if (password.length < 6) {
    showMessage("Password must be at least 6 characters.", "error");
    return;
  }

  resetBtn.disabled = true;
  resetBtn.innerText = "Resetting...";

  try {
    const response = await fetch(`${API_BASE}/reset-password`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        token,
        password
      })
    });

    const result = await response.json().catch(() => ({}));

    if (!response.ok) {
      showMessage(result.message || "Failed to reset password.", "error");
      resetBtn.disabled = false;
      resetBtn.innerText = "Reset Password";
      return;
    }

    showMessage(result.message || "Password reset successfully.", "success");

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);

  } catch (error) {
    showMessage("Unable to connect to server. Please try again.", "error");
    resetBtn.disabled = false;
    resetBtn.innerText = "Reset Password";
  }
});
</script>

</body>
</html>
